
# Production Nginx Configuration for Railmitra
# Place this file at /etc/nginx/sites-available/railmitra and link to sites-enabled

server {
    listen 80;
    server_name example.com;  # Replace with your real domain or server IP

    # Proxy all API and app requests to Node.js backend
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    # Serve static frontend files directly
    location /static/ {
        alias /e/connect\ to\ lift/railmitra/railmitra/frontend/;
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }

    # GZIP compression for faster delivery
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
    gzip_min_length 256;
}

# After editing, run:
# sudo ln -s /etc/nginx/sites-available/railmitra /etc/nginx/sites-enabled/
# sudo nginx -t
# sudo systemctl reload nginx
